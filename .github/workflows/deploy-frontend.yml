name: Deploy Frontend (Vercel)

# Triggers:
#   - any push to main that changes frontend code
#   - manual run from the GitHub UI
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

# Cancel in-flight deploys when a newer commit lands
concurrency:
  group: deploy-frontend
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # `vercel pull` downloads the env vars + project config into .vercel/.
      # Doppler is wired to Vercel as the source of truth for env vars (see
      # DEPLOYMENT.md), so this picks up everything VITE_* automatically.
      - name: Pull Vercel project config + env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # We let Vercel build remotely (vercel deploy without --prebuilt) instead
      # of running `vercel build` in CI. The local-build path tends to throw
      # `spawn sh ENOENT` when Vercel's stored project settings and the
      # checkout disagree on the install/build commands. Remote build adds
      # ~90s but is rock-solid.
      - name: Deploy
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
